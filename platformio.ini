[platformio]
src_dir = hardware

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

[env:collect-data]
build_src_filter = +<CollectData/> -<VoiceAssistant/> -<enclosure/>
lib_deps = sparkfun/SparkFun BMI270 Arduino Library

[env:voice-assistant]
build_src_filter = +<VoiceAssistant/> -<CollectData/> -<enclosure/>
