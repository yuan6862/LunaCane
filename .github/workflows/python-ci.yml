name: Python CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall data_collection ml voice tests

      - name: Import core modules
        run: |
          python - <<'PY'
          import tensorflow as tf
          from ml.preprocess import build_tinyml_cnn
          from voice.luna_core import LunaBrain

          model = build_tinyml_cnn((100, 8))
          print("tensorflow", tf.__version__)
          print("model_params", model.count_params())
          print("luna_core", LunaBrain.__name__)
          PY

      - name: Run unit tests
        run: python -m unittest discover -s tests
